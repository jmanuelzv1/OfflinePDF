    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-2: #f5f5f7;
      --surface-3: #e8e8ed;
      --border: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.13);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --accent-light: #e8f1fb;
      --success: #34c759;
      --success-light: rgba(52,199,89,0.1);
      --danger: #ff3b30;
      --danger-light: rgba(255,59,48,0.1);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --shadow: 0 2px 20px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-top: 52px;
      margin-bottom: 52px;
      animation: fadeUp .6s ease both;
    }
    .header-icon {
      width: 64px; height: 64px;
      background: var(--surface);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: var(--shadow);
    }
    .header-icon svg { width: 34px; height: 34px; }
    h1 { font-size: 34px; font-weight: 600; letter-spacing: -.5px; margin-bottom: 8px; }
    .subtitle { font-size: 17px; color: var(--text-secondary); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%; max-width: 680px;
      overflow: hidden;
      animation: fadeUp .6s .1s ease both;
    }

    /* ── Drop zone ── */
    .drop-zone {
      padding: 52px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      cursor: pointer;
      border: 2px dashed transparent;
      transition: background .2s, border-color .2s;
      border-radius: var(--radius);
    }
    .drop-zone.dragover { background: var(--accent-light); border-color: var(--accent); }
    .drop-zone:hover .dz-icon { transform: scale(1.05); }
    .dz-icon {
      width: 72px; height: 72px;
      background: var(--surface-2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      margin-bottom: 2px;
    }
    .dz-icon svg { width: 34px; height: 34px; color: var(--accent); }
    .dz-label { font-size: 17px; font-weight: 500; }
    .dz-sub   { font-size: 13px; color: var(--text-tertiary); }
    .btn-choose {
      margin-top: 4px;
      background: var(--accent); color: white; border: none;
      padding: 10px 22px; border-radius: 980px;
      font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
      transition: background .18s, transform .15s;
    }
    .btn-choose:hover { background: var(--accent-hover); }
    .btn-choose:active { transform: scale(.97); }
    #file-input { display: none; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 0 24px; }

    /* ── Toolbar ── */
    .toolbar {
      display: none; padding: 18px 24px;
      align-items: center; justify-content: space-between; gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar.visible { display: flex; }
    .toolbar-left { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }
    .toolbar-right { display: flex; gap: 8px; align-items: center; }

    .btn-toolbar {
      background: var(--surface-2); border: 1.5px solid var(--border);
      border-radius: var(--radius-xs); padding: 7px 13px;
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
      color: var(--text-primary); display: flex; align-items: center; gap: 6px;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn-toolbar:hover { background: #ebebf0; border-color: var(--border-mid); }
    .btn-toolbar svg { width: 14px; height: 14px; }
    .btn-toolbar.primary {
      background: var(--accent-light); border-color: var(--accent); color: var(--accent);
    }
    .btn-toolbar.primary:hover { background: #daeafa; }

    /* ── Image grid ── */
    .grid-wrap { display: none; padding: 0 24px 8px; }
    .grid-wrap.visible { display: block; }

    .img-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .img-card {
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
      animation: slideIn .2s ease both;
      cursor: grab;
      user-select: none;
      transition: box-shadow .2s, transform .15s;
    }
    .img-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .img-card.dragging {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    /* Drop spacer for grid */
    .img-drop-spacer {
      background: var(--accent-light);
      border: 2px dashed var(--accent);
      border-radius: var(--radius-sm);
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
      opacity: 0;
    }
    .img-drop-spacer.active { opacity: 1; }
    .img-drop-spacer-label {
      font-size: 11px; font-weight: 600; color: var(--accent);
    }

    /* Spring in on drop */
    @keyframes dropBounce {
      0%   { transform: scale(1.05); }
      55%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }
    .img-card.just-dropped { animation: dropBounce .35s cubic-bezier(.34,1.56,.64,1) both; }

    .img-card img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover; display: block;
      background: white; pointer-events: none;
    }
    .img-card-footer {
      padding: 6px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .img-card-name {
      font-size: 11px; font-weight: 500; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 80px;
    }
    .img-card-order {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--surface-3);
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-remove-img {
      position: absolute; top: 6px; right: 6px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,.5); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
      color: white;
    }
    .img-card:hover .btn-remove-img { opacity: 1; }
    .btn-remove-img svg { width: 11px; height: 11px; }

    /* Drop hint */
    .drag-hint {
      font-size: 12px; color: var(--text-tertiary);
      text-align: center; padding: 10px 0 4px;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .drag-hint svg { width: 13px; height: 13px; }

    /* ── Options ── */
    .options-wrap { display: none; padding: 16px 24px 0; }
    .options-wrap.visible { display: block; }

    .options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .opt-block {
      background: var(--surface-2); border-radius: var(--radius-sm); padding: 14px 16px;
    }
    .opt-label {
      font-size: 11px; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px;
    }
    .opt-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .opt-pill {
      background: var(--surface-3); border: 1.5px solid transparent;
      border-radius: 7px; padding: 5px 11px;
      font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
      color: var(--text-secondary); transition: border-color .2s, background .2s, color .2s;
    }
    .opt-pill:hover { border-color: var(--border-mid); }
    .opt-pill.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    /* Filename input */
    .filename-wrap { padding: 12px 24px 0; display: none; }
    .filename-wrap.visible { display: block; }
    .filename-label {
      font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px;
    }
    .filename-input {
      width: 100%; background: var(--surface-2); border: 1.5px solid var(--border-mid);
      border-radius: var(--radius-xs); padding: 9px 13px;
      font-size: 14px; font-family: inherit; color: var(--text-primary);
      outline: none; transition: border-color .2s;
    }
    .filename-input:focus { border-color: var(--accent); }

    /* ── Error ── */
    .error-msg {
      display: none; margin: 14px 24px 0;
      padding: 12px 16px; background: var(--danger-light);
      border-radius: var(--radius-xs);
      color: var(--danger); font-size: 14px; font-weight: 500;
    }
    .error-msg.visible { display: block; }

    /* ── Action ── */
    .action-wrap { display: none; padding: 20px 24px; }
    .action-wrap.visible { display: block; }
    .btn-build {
      width: 100%; background: var(--accent); color: white; border: none;
      border-radius: 14px; padding: 16px;
      font-size: 17px; font-weight: 600; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .18s, transform .15s, opacity .2s;
    }
    .btn-build:hover { background: var(--accent-hover); }
    .btn-build:active { transform: scale(.98); }
    .btn-build:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-build svg { width: 20px; height: 20px; }

    /* ── Progress ── */
    .progress-wrap { display: none; padding: 0 24px 24px; flex-direction: column; gap: 12px; }
    .progress-wrap.visible { display: flex; }
    .progress-track { height: 6px; background: var(--surface-2); border-radius: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 6px; width: 0%; transition: width .3s ease; }
    .progress-label { font-size: 13px; color: var(--text-secondary); text-align: center; }

    /* ── Done ── */
    .done-wrap { display: none; padding: 32px; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
    .done-wrap.visible { display: flex; }
    .done-icon {
      width: 60px; height: 60px; background: var(--success-light); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    .done-icon svg { width: 30px; height: 30px; color: var(--success); }
    .done-title { font-size: 20px; font-weight: 600; }
    .done-sub   { font-size: 15px; color: var(--text-secondary); }
    .btn-reset {
      background: var(--surface-2); color: var(--text-primary); border: none;
      padding: 12px 28px; border-radius: 980px;
      font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
      transition: background .18s; margin-top: 4px;
    }
    .btn-reset:hover { background: var(--surface-3); }

    /* ── Drag ghost ── */
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 1000;
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: var(--radius-sm);
      box-shadow: 0 12px 36px rgba(0,0,0,.16), 0 0 0 4px var(--accent-light);
      overflow: hidden; opacity: .97;
      animation: ghostLift .14s cubic-bezier(.34,1.56,.64,1) both;
    }
    .drag-ghost img { width: 100px; height: 100px; object-fit: cover; display: block; }

    @keyframes ghostLift {
      from { transform: scale(.97) rotate(0deg); }
      to   { transform: scale(1.04) rotate(-1.5deg); }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { transform: scale(.5); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
