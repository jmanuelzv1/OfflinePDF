<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — OfflinePDF</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      background: rgba(245,245,247,0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0,0,0,.08);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #1d1d1f; font-size: 15px; font-weight: 600;
    }
    .nav-logo-mark {
      width: 28px; height: 28px; background: #0071e3;
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
    }
    .nav-links {
      display: flex; align-items: center; gap: 28px; list-style: none;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .nav-links a {
      font-size: 14px; color: #6e6e73; text-decoration: none;
      transition: color .15s;
    }
    .nav-links a:hover { color: #1d1d1f; }
    .nav-links a.active { color: #1d1d1f; font-weight: 500; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-account {
      display: flex; align-items: center; gap: 8px; text-decoration: none;
      color: #1d1d1f; font-size: 14px; font-weight: 500;
      padding: 5px 12px 5px 6px; border-radius: 980px;
      border: 1px solid rgba(0,0,0,.11); background: white;
      transition: background .15s;
    }
    .nav-account:hover { background: #f0f0f5; }
    .nav-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: #0071e3; color: white;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .nav-signout {
      font-size: 14px; color: #6e6e73; background: none; border: none;
      cursor: pointer; padding: 7px 14px; border-radius: 980px;
      font-family: inherit; transition: background .15s, color .15s;
      border: 1px solid transparent;
    }
    .nav-signout:hover { background: #e8e8ed; color: #1d1d1f; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
    }

    /* ── Layout ── */
    .page {
      max-width: 640px; margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .page-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 32px; font-weight: 400; letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 15px; color: #6e6e73; margin-bottom: 32px;
    }

    /* ── Cards ── */
    .card {
      background: white; border-radius: 18px;
      padding: 28px; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .card-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: #aeaeb2; margin-bottom: 16px;
    }

    /* ── Plan card ── */
    .plan-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
    }
    .plan-info { display: flex; align-items: center; gap: 14px; }
    .plan-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .plan-icon.free { background: #f5f5f7; color: #6e6e73; }
    .plan-icon.pro  { background: rgba(0,113,227,.1); color: #0071e3; }
    .plan-name { font-size: 17px; font-weight: 600; color: #1d1d1f; }
    .plan-desc { font-size: 13px; color: #6e6e73; margin-top: 2px; }
    .badge-pro {
      display: inline-flex; align-items: center;
      background: rgba(0,113,227,.1); color: #0071e3;
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: .3px; text-transform: uppercase;
    }
    .badge-free {
      display: inline-flex; align-items: center;
      background: #f5f5f7; color: #6e6e73;
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: .3px; text-transform: uppercase;
    }
    .btn-upgrade {
      display: inline-block; background: #0071e3; color: white;
      padding: 9px 20px; border-radius: 980px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: background .15s, transform .15s; white-space: nowrap;
    }
    .btn-upgrade:hover { background: #0077ed; transform: translateY(-1px); }
    .btn-manage {
      display: inline-block; background: #f5f5f7; color: #1d1d1f;
      padding: 9px 20px; border-radius: 980px;
      font-size: 14px; font-weight: 500; border: none;
      cursor: pointer; font-family: inherit;
      transition: background .15s, transform .15s;
    }
    .btn-manage:hover { background: #e8e8ed; transform: translateY(-1px); }
    .btn-manage:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .plan-manage-row {
      display: flex; align-items: center; gap: 12px; margin-top: 16px;
      padding-top: 16px; border-top: 1px solid #f0f0f5;
    }
    .cancel-link {
      font-size: 13px; color: #aeaeb2; text-decoration: none; cursor: pointer;
      background: none; border: none; font-family: inherit; padding: 0;
    }
    .cancel-link:hover { color: #ff3b30; text-decoration: underline; }

    /* ── Usage card ── */
    .usage-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .usage-label { font-size: 14px; color: #1d1d1f; font-weight: 500; }
    .usage-count { font-size: 14px; color: #6e6e73; }
    .usage-bar-bg {
      height: 6px; background: #f0f0f5; border-radius: 6px; overflow: hidden;
    }
    .usage-bar-fill {
      height: 100%; border-radius: 6px;
      background: #0071e3; transition: width .4s ease;
    }
    .usage-bar-fill.full { background: #ff3b30; }
    .usage-note {
      font-size: 12px; color: #aeaeb2; margin-top: 8px;
    }
    .usage-unlimited {
      font-size: 14px; color: #34c759; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Account card ── */
    .account-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f0f0f5;
    }
    .account-row:last-child { border-bottom: none; padding-bottom: 0; }
    .account-row:first-child { padding-top: 0; }
    .account-key { font-size: 13px; color: #6e6e73; }
    .account-val { font-size: 14px; color: #1d1d1f; font-weight: 500; }

    /* ── Tools grid ── */
    .tools-section { margin-top: 8px; }
    .tools-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .tools-section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: #aeaeb2;
    }
    .tools-section-all {
      font-size: 13px; color: #0071e3; text-decoration: none; font-weight: 500;
    }
    .tools-section-all:hover { text-decoration: underline; }
    .tools-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .tool-card {
      background: white; border-radius: 14px;
      padding: 16px 12px; text-decoration: none; color: #1d1d1f;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; text-align: center;
      transition: transform .15s, box-shadow .15s;
    }
    .tool-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    .tool-card-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tool-card-name {
      font-size: 12px; font-weight: 600; color: #1d1d1f; line-height: 1.3;
    }
    @media (max-width: 540px) {
      .tools-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f5 25%, #e8e8ed 50%, #f0f0f5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px; height: 16px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Upgrade modal */
    #upgrade-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; animation: fade-in .2s ease;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    #upgrade-box {
      background: white; border-radius: 20px;
      padding: 36px; max-width: 420px; width: 100%;
      position: relative; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.2);
      animation: slide-up .25s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slide-up {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    #upgrade-box h2 {
      font-size: 20px; font-weight: 700; color: #1d1d1f;
      margin: 0 0 8px;
    }
    #upgrade-box p {
      font-size: 14px; color: #6e6e73; margin: 0 0 24px; line-height: 1.6;
    }
    .upgrade-plans {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
    }
    .upgrade-plan {
      border: 2px solid #e5e5ea; border-radius: 12px;
      padding: 16px 10px; cursor: pointer; background: white;
      position: relative; transition: border-color .15s; text-align: center;
    }
    .upgrade-plan.active { border-color: #0071e3; background: rgba(0,113,227,.04); }
    .upgrade-plan:hover { border-color: #0071e3; }
    .upgrade-plan-label {
      font-size: 11px; font-weight: 700; color: #6e6e73;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }
    .upgrade-plan.active .upgrade-plan-label { color: #0071e3; }
    .upgrade-plan-price { font-size: 28px; font-weight: 700; color: #1d1d1f; line-height: 1; }
    .upgrade-plan-price span { font-size: 14px; font-weight: 400; color: #6e6e73; }
    .upgrade-plan-note { font-size: 11px; color: #aeaeb2; margin-top: 4px; }
    .upgrade-plan-badge {
      position: absolute; top: -9px; right: 8px;
      background: #34c759; color: white;
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 20px;
    }
    .upgrade-features {
      background: #f5f5f7; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 20px; text-align: left;
    }
    .upgrade-feature {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #1d1d1f; padding: 4px 0;
    }
    .upgrade-feature-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: rgba(52,199,89,.15); color: #34c759;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 9px; font-weight: 700;
    }
    #upgrade-cta {
      width: 100%; padding: 14px; border-radius: 980px;
      background: #0071e3; color: white; border: none;
      font-size: 16px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .15s, transform .15s;
      margin-bottom: 8px;
    }
    #upgrade-cta:hover { background: #0077ed; transform: translateY(-1px); }
    #upgrade-cta:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    #upgrade-error { font-size: 13px; color: #ff3b30; min-height: 18px; margin-bottom: 4px; }
    .upgrade-close {
      position: absolute; top: 16px; right: 16px;
      width: 28px; height: 28px; border-radius: 50%;
      background: #f5f5f7; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #6e6e73; transition: background .15s;
    }
    .upgrade-close:hover { background: #e8e8ed; }
    .upgrade-signin {
      font-size: 13px; color: #aeaeb2;
    }
    .upgrade-signin a { color: #0071e3; text-decoration: none; font-weight: 500; }
    .upgrade-signin a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      nav { padding: 0 20px; }
      .page { padding: 32px 16px 60px; }
      .plan-row { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL  = 'https://cboglntoucldhujbmeuc.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_k66dzxNIWHY7fL6G65fWLQ_nI6JBo6D';
  const FREE_MAX_OPS  = 5;

  const client = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Auth check ─────────────────────────────────────────────────────────
  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    window.location.href = 'login.html';
  }

  const user  = session.user;
  const email = user.email;

  // Set nav avatar initial
  const avatarEl = document.getElementById('nav-avatar');
  if (avatarEl) avatarEl.textContent = email.charAt(0).toUpperCase();

  // Save to localStorage for paywall
  localStorage.setItem('opdf_pro_email', email);
  localStorage.removeItem('opdf_pro_cache');
  localStorage.removeItem('opdf_pro_ts');

  // ── Fetch plan from Supabase ───────────────────────────────────────────
  const { data: userData } = await client
    .from('users')
    .select('plan, subscription_status, created_at')
    .eq('email', email)
    .single();

  const isPro = userData?.plan === 'pro' && userData?.subscription_status === 'active';

  // ── Page subtitle ──────────────────────────────────────────────────────
  document.getElementById('page-subtitle').textContent = `Signed in as ${email}`;

  // ── Plan card ──────────────────────────────────────────────────────────
  const planRow = document.getElementById('plan-row');
  if (isPro) {
    planRow.innerHTML = `
      <div class="plan-info">
        <div class="plan-icon pro">
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
            <path d="M12 2L4 6.5V12c0 5 3.8 9.7 8 11 4.2-1.3 8-6 8-11V6.5L12 2z"
              stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M8.5 12l2.5 2.5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="plan-name">Pro Plan</div>
          <div class="plan-desc">Unlimited file sizes &amp; operations</div>
        </div>
      </div>
      <span class="badge-pro">Active</span>
      <div class="plan-manage-row">
        <button class="btn-manage" id="btn-manage-billing">Manage subscription</button>
        <button class="cancel-link" id="btn-cancel">Cancel subscription</button>
      </div>`;
  } else {
    planRow.innerHTML = `
      <div class="plan-info">
        <div class="plan-icon free">
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
            <rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 12h6M12 9v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="plan-name">Free Plan</div>
          <div class="plan-desc">5 operations/day · 25 MB file limit</div>
        </div>
      </div>
      <button class="btn-upgrade" onclick="showUpgradeModal()">Upgrade to Pro</button>`;
  }

  // ── Usage card ─────────────────────────────────────────────────────────
  const usageContent = document.getElementById('usage-content');
  if (isPro) {
    usageContent.innerHTML = `
      <div class="usage-unlimited">
        <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
          <path d="M2 8c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6-6-2.7-6-6z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Unlimited operations — no daily cap
      </div>`;
  } else {
    const today     = new Date().toISOString().slice(0, 10);
    const savedDate = localStorage.getItem('opdf_ops_date');
    const opsUsed   = savedDate === today
      ? parseInt(localStorage.getItem('opdf_ops_count') || '0', 10)
      : 0;
    const pct  = Math.min((opsUsed / FREE_MAX_OPS) * 100, 100);
    const full = opsUsed >= FREE_MAX_OPS;

    usageContent.innerHTML = `
      <div class="usage-row">
        <span class="usage-label">Operations today</span>
        <span class="usage-count">${opsUsed} / ${FREE_MAX_OPS}</span>
      </div>
      <div class="usage-bar-bg">
        <div class="usage-bar-fill ${full ? 'full' : ''}" style="width:${pct}%"></div>
      </div>
      <p class="usage-note">${full
        ? 'Daily limit reached. Resets at midnight or <a href="#" onclick="showUpgradeModal();return false;" style="color:#0071e3;text-decoration:none">upgrade to Pro</a> for unlimited.'
        : `${FREE_MAX_OPS - opsUsed} operation${FREE_MAX_OPS - opsUsed === 1 ? '' : 's'} remaining today.`
      }</p>`;
  }

  // ── Account card ───────────────────────────────────────────────────────
  const joinDate = userData?.created_at
    ? new Date(userData.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
    : new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  document.getElementById('account-content').innerHTML = `
    <div class="account-row">
      <span class="account-key">Email</span>
      <span class="account-val">${email}</span>
    </div>
    <div class="account-row">
      <span class="account-key">Member since</span>
      <span class="account-val">${joinDate}</span>
    </div>
    <div class="account-row">
      <span class="account-key">Plan</span>
      <span class="account-val">${isPro ? 'Pro' : 'Free'}</span>
    </div>`;

  // ── Stripe portal ─────────────────────────────────────────────────────
  const PORTAL_URL = 'https://offlinepdf-portal.offlinepdf.workers.dev';

  async function openPortal() {
    const btn = document.getElementById('btn-manage-billing');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    try {
      const res  = await fetch(PORTAL_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert(data.error || 'Could not open billing portal. Please try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Manage subscription'; }
      }
    } catch {
      alert('Something went wrong. Please try again.');
      if (btn) { btn.disabled = false; btn.textContent = 'Manage subscription'; }
    }
  }

  if (isPro) {
    document.getElementById('btn-manage-billing')?.addEventListener('click', openPortal);
    document.getElementById('btn-cancel')?.addEventListener('click', openPortal);
  }

  // ── Sign out ───────────────────────────────────────────────────────────
  document.getElementById('btn-signout').addEventListener('click', async () => {
    await client.auth.signOut();
    localStorage.removeItem('opdf_pro_email');
    localStorage.removeItem('opdf_pro_cache');
    localStorage.removeItem('opdf_pro_ts');
    window.location.href = 'index.html';
  });

  // ── Upgrade modal ─────────────────────────────────────────────────────
  function showUpgradeModal() {
    document.getElementById('upgrade-modal')?.remove();

    const modal = document.createElement('div');
    modal.id = 'upgrade-modal';
    modal.innerHTML = `
      <div id="upgrade-overlay">
        <div id="upgrade-box">
          <button class="upgrade-close" onclick="document.getElementById('upgrade-modal').remove()">
            <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
              <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
          <h2>Upgrade to Pro</h2>
          <p>Unlimited file sizes, unlimited daily operations — no restrictions.</p>

          <div class="upgrade-plans">
            <button class="upgrade-plan active" data-plan="annual">
              <div class="upgrade-plan-badge">Save 22%</div>
              <div class="upgrade-plan-label">Annual</div>
              <div class="upgrade-plan-price">$7<span>/mo</span></div>
              <div class="upgrade-plan-note">Billed $84/year</div>
            </button>
            <button class="upgrade-plan" data-plan="monthly">
              <div class="upgrade-plan-label">Monthly</div>
              <div class="upgrade-plan-price">$9<span>/mo</span></div>
              <div class="upgrade-plan-note">Billed monthly</div>
            </button>
          </div>

          <div class="upgrade-features">
            <div class="upgrade-feature">
              <div class="upgrade-feature-dot">✓</div> Unlimited file sizes
            </div>
            <div class="upgrade-feature">
              <div class="upgrade-feature-dot">✓</div> Unlimited daily operations
            </div>
            <div class="upgrade-feature">
              <div class="upgrade-feature-dot">✓</div> All 12 PDF tools included
            </div>
            <div class="upgrade-feature">
              <div class="upgrade-feature-dot">✓</div> Cancel anytime
            </div>
          </div>

          <button id="upgrade-cta">Upgrade to Pro</button>
          <div id="upgrade-error"></div>
        </div>
      </div>`;

    document.body.appendChild(modal);

    let selectedPlan = 'annual';
    modal.querySelectorAll('.upgrade-plan').forEach(btn => {
      btn.addEventListener('click', () => {
        modal.querySelectorAll('.upgrade-plan').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedPlan = btn.dataset.plan;
      });
    });

    modal.querySelector('#upgrade-overlay').addEventListener('click', e => {
      if (e.target === modal.querySelector('#upgrade-overlay')) modal.remove();
    });

    modal.querySelector('#upgrade-cta').addEventListener('click', async () => {
      const ctaBtn  = modal.querySelector('#upgrade-cta');
      const errorEl = modal.querySelector('#upgrade-error');
      errorEl.textContent = '';
      ctaBtn.disabled = true;
      ctaBtn.textContent = 'Redirecting…';

      try {
        const res  = await fetch('https://offlinepdf-checkout.offlinepdf.workers.dev', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, plan: selectedPlan }),
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Could not create checkout session');
        }
      } catch (err) {
        ctaBtn.disabled = false;
        ctaBtn.textContent = 'Upgrade to Pro';
        errorEl.textContent = 'Something went wrong. Please try again.';
      }
    });
  }

</script>

</body>
</html>
