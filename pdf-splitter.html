      border-radius: 31px;
      cursor: pointer;
      transition: background 0.25s;

    .toggle input:checked + .toggle-track { background: var(--success); }

      top: 2px;
      left: 2px;
      width: 27px;
      height: 27px;
      background: white;

      border-radius: 6px;

    .progress-fill {

    const hamburgerIcon = `<svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
    const closeIcon = `<svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
    function closeMobileMenu() { mobileMenu.classList.remove('open'); hamburger.innerHTML = hamburgerIcon; }
    if (hamburger) {
      hamburger.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = mobileMenu.classList.toggle('open');
        hamburger.innerHTML = isOpen ? closeIcon : hamburgerIcon;
      });
      document.addEventListener('click', e => {
        if (!mobileMenu.contains(e.target) && !hamburger.contains(e.target)) closeMobileMenu();
      });
    }
  </script>
</body>
</html>
