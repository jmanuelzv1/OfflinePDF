    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --surface-3: #e8e8ed;
      --border: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.13);
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0071e3;

    .header { text-align: center; margin-top: 52px;

    /* ── Drop zone ── */
    .drop-zone {
      padding: 52px 40px;

      cursor: pointer; border: 2px dashed transparent;

    .drop-zone.dragover { background: var(--accent-light); border-color: var(--accent); }
    .drop-zone:hover .dz-icon { transform: scale(1.05); }
    .dz-icon {
      width: 72px; height: 72px; background: var(--surface-2);

    #file-input { display: none; }

    /* ── Divider ── */

    .pill-group { display: flex; gap: 5px; flex-wrap: wrap; }

    .pill:hover { border-color: var(--border-mid); }
    .pill.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    /* Toggle row */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px;
    }
    .toggle-label { font-size: 14px; font-weight: 500; }
    .toggle-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; background: #e5e5ea; border-radius: 26px;
      cursor: pointer; transition: background .25s;
    }
    .toggle input:checked + .toggle-track { background: var(--success); }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 22px; height: 22px; background: white; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.28);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1); pointer-events: none;

    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    /* ── Info banner ── */

    .btn-extract:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-extract svg { width: 20px; height: 20px; }

    /* ── Progress ── */
    .progress-wrap { display: none; padding: 0 28px 24px; flex-direction: column; gap: 12px; }

    .progress-track { height: 6px; background: var(--surface-2); border-radius: 6px; overflow: hidden; }

    .progress-label { font-size: 13px; color: var(--text-secondary); text-align: center; }

    /* ── Result ── */
    .result-wrap { display: none; padding: 20px 28px 0; flex-direction: column; gap: 14px; }

    .result-stats {

    /* Text preview */
    .text-preview-wrap {
      background: var(--surface-2); border-radius: var(--radius-sm); overflow: hidden;
    }
    .text-preview-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);

    .btn-copy.copied { border-color: var(--success); color: var(--success); }
    .btn-copy svg { width: 13px; height: 13px; }

    .text-preview {
      padding: 16px; max-height: 280px; overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 12px; line-height: 1.7;
      color: var(--text-secondary); white-space: pre-wrap; word-break: break-word;
    }
    .text-preview::-webkit-scrollbar { width: 6px; }
    .text-preview::-webkit-scrollbar-track { background: transparent; }
    .text-preview::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

    /* Download actions */
    .download-actions { display: flex; gap: 10px; }

      flex: 1; background: var(--accent); color: white; border: none;
      border-radius: var(--radius-sm); padding: 14px;

    .result-footer { padding-bottom: 28px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
