      --border: rgba(0,0,0,0.08);

      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --accent-light: #e8f1fb;
      --success: #34c759;

      --danger: #ff3b30;
      --danger-light: rgba(255,59,48,0.1);
      --orange: #ff9500;

      --radius: 18px;

      --radius-xs: 8px;

    body {

    /* ── Header ── */
    .header {
      text-align: center;

      margin-bottom: 52px;

    .header-icon {

      overflow: hidden;
      animation: fadeUp .6s .1s ease both;
    }

    /* ── Drop zone ── */
    .drop-zone {
      padding: 52px 40px;

      cursor: pointer;
      border: 2px dashed transparent;
      transition: background .2s, border-color .2s;
      border-radius: var(--radius);
    }
    .drop-zone.dragover { background: var(--accent-light); border-color: var(--accent); }
    .drop-zone:hover .dz-icon { transform: scale(1.05); }
    .dz-icon {
      width: 72px; height: 72px;
      background: var(--surface-2);
      border-radius: 20px;

      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      margin-bottom: 2px;
    }
    .dz-icon svg { width: 34px; height: 34px; color: var(--accent); }

    .dz-sub   { font-size: 13px; color: var(--text-tertiary); }
    .btn-choose {

    .pw-field-wrap {

    .pw-field {

      padding: 11px 44px 11px 14px; font-size: 15px; font-family: inherit;

    .pw-field:focus { border-color: var(--accent); }

    .pw-field.weak    { border-color: var(--danger); }

      position: absolute; right: 12px;

    .btn-toggle-pw:hover { color: var(--text-primary); }
    .btn-toggle-pw svg { width: 18px; height: 18px; }

    /* Strength bar */
    .strength-wrap { margin-top: 8px; }
    .strength-bar-track {
      height: 4px; background: var(--surface-3); border-radius: 4px; overflow: hidden; margin-bottom: 5px;
    }
    .strength-bar-fill {
      height: 100%; border-radius: 4px; width: 0%;

    .strength-label { font-size: 12px; color: var(--text-tertiary); }

    .permission-sub  { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* Toggle switch */
    .toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; background: #e5e5ea; border-radius: 26px;
      cursor: pointer; transition: background .25s;
    }
    .toggle input:checked + .toggle-track { background: var(--success); }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 22px; height: 22px; background: white; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.28);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;

    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    .action-wrap { display: none; padding: 24px 32px; }

    .done-icon svg { width: 30px; height: 30px; color: var(--success); }
    .done-title { font-size: 20px; font-weight: 600; }
    .done-sub   { font-size: 15px; color: var(--text-secondary); }

  <script>
