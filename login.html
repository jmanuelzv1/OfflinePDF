<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — OfflinePDF</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; -webkit-font-smoothing: antialiased;
    }
    .card {
      background: white; border-radius: 24px;
      padding: 48px 40px; max-width: 400px; width: 100%;
      text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.08);
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      justify-content: center; margin-bottom: 32px;
      text-decoration: none; color: #1d1d1f;
      font-size: 16px; font-weight: 600;
    }
    .logo-mark {
      width: 32px; height: 32px; background: #0071e3;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 28px; font-weight: 400; letter-spacing: -.02em;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px; color: #6e6e73; margin-bottom: 32px; line-height: 1.5;
    }
    .btn-oauth {
      width: 100%; padding: 13px 20px; border-radius: 12px;
      border: 1.5px solid #e5e5ea; background: white;
      font-size: 15px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color .15s, background .15s, transform .15s;
      font-family: inherit; color: #1d1d1f; margin-bottom: 12px;
      text-decoration: none;
    }
    .btn-oauth:hover {
      border-color: #aeaeb2; background: #fafafa;
      transform: translateY(-1px);
    }
    .btn-oauth:active { transform: translateY(0); }
    .btn-oauth svg { flex-shrink: 0; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: #aeaeb2; font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e5e5ea;
    }
    .terms {
      font-size: 12px; color: #aeaeb2; margin-top: 24px; line-height: 1.5;
    }
    .terms a { color: #6e6e73; text-decoration: none; }
    .terms a:hover { text-decoration: underline; }
    .back-link {
      display: block; margin-top: 20px;
      font-size: 13px; color: #6e6e73; text-decoration: none;
    }
    .back-link:hover { color: #1d1d1f; }
    .status-msg {
      font-size: 14px; color: #6e6e73; margin-top: 16px;
      min-height: 20px;
    }
    .status-msg.error { color: #ff3b30; }
    .status-msg.success { color: #34c759; }

    /* Loading state */
    .btn-oauth.loading {
      opacity: .6; pointer-events: none;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid #e5e5ea;
      border-top-color: #0071e3; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Magic link */
    .email-wrap { width: 100%; margin-bottom: 4px; }
    #magic-email {
      width: 100%; padding: 13px 16px; border-radius: 12px;
      border: 1.5px solid #e5e5ea; font-size: 15px;
      font-family: inherit; outline: none; transition: border-color .15s;
      margin-bottom: 10px; color: #1d1d1f;
    }
    #magic-email:focus { border-color: #0071e3; }
    #magic-email.error { border-color: #ff3b30; }
    .btn-magic {
      width: 100%; padding: 13px 20px; border-radius: 12px;
      border: none; background: #1d1d1f; color: white;
      font-size: 15px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: background .15s, transform .15s;
    }
    .btn-magic:hover { background: #2d2d2f; transform: translateY(-1px); }
    .btn-magic:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .magic-sent {
      background: rgba(52,199,89,.08); border: 1.5px solid rgba(52,199,89,.2);
      border-radius: 12px; padding: 16px; margin-bottom: 4px;
      font-size: 14px; color: #1d1d1f; line-height: 1.5; text-align: left;
    }
    .magic-sent strong { color: #34c759; }
  </style>
</head>
<body>

<div class="card">
  <a class="logo" href="index.html">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
        <rect x="1" y="1" width="10" height="13" rx="2" fill="white" opacity=".3"/>
        <rect x="3" y="3" width="10" height="13" rx="2" fill="white"/>
      </svg>
    </div>
    OfflinePDF
  </a>

  <h1>Sign in to OfflinePDF</h1>
  <p class="subtitle">Sign in to access your Pro subscription and remove all limits.</p>

  <button class="btn-oauth" id="btn-google">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
      <path d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">or</div>

  <div class="email-wrap">
    <input type="email" id="magic-email" placeholder="Enter your email address" autocomplete="email" />
    <button class="btn-magic" id="btn-magic">Send sign-in link</button>
  </div>

  <div class="status-msg" id="status-msg"></div>

  <div class="terms">
    By signing in you agree to our
    <a href="privacy.html">Privacy Policy</a>.
    We only store your email to verify your Pro subscription.
  </div>

  <a class="back-link" href="index.html">← Back to all tools</a>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL  = 'https://cboglntoucldhujbmeuc.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_k66dzxNIWHY7fL6G65fWLQ_nI6JBo6D';

  const client   = createClient(SUPABASE_URL, SUPABASE_ANON);
  const statusEl = document.getElementById('status-msg');
  const btnGoogle = document.getElementById('btn-google');

  // ── Handle OAuth callback ──────────────────────────────────────────────
  async function handleAuthCallback() {
    const { data, error } = await client.auth.getSession();
    if (error || !data.session) return;

    const user  = data.session.user;
    const email = user.email;

    if (!email) return;

    // Save email to localStorage for paywall checks
    localStorage.setItem('opdf_pro_email', email);
    localStorage.removeItem('opdf_pro_cache');
    localStorage.removeItem('opdf_pro_ts');

    // Check if user is Pro in Supabase
    const { data: userData } = await client
      .from('users')
      .select('plan, subscription_status')
      .eq('email', email)
      .single();

    const isPro = userData?.plan === 'pro' && userData?.subscription_status === 'active';

    if (isPro) {
      statusEl.className = 'status-msg success';
      statusEl.textContent = '✓ Pro access restored! Redirecting…';
      setTimeout(() => window.location.href = 'index.html', 1500);
    } else {
      statusEl.className = 'status-msg';
      statusEl.textContent = 'Signed in as ' + email + '. No active Pro subscription found.';
      setTimeout(() => window.location.href = 'pricing.html', 2500);
    }
  }

  // Check if we're returning from OAuth
  const hash = window.location.hash;
  if (hash && (hash.includes('access_token') || hash.includes('error'))) {
    statusEl.textContent = 'Signing you in…';
    handleAuthCallback();
  }

  // ── Magic link ─────────────────────────────────────────────────────────
  const btnMagic   = document.getElementById('btn-magic');
  const magicEmail = document.getElementById('magic-email');
  const emailWrap  = document.querySelector('.email-wrap');

  btnMagic.addEventListener('click', async () => {
    const email = magicEmail.value.trim();
    magicEmail.classList.remove('error');
    statusEl.className = 'status-msg';
    statusEl.textContent = '';

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      magicEmail.classList.add('error');
      statusEl.className = 'status-msg error';
      statusEl.textContent = 'Please enter a valid email address.';
      return;
    }

    btnMagic.disabled    = true;
    btnMagic.textContent = 'Sending…';

    const { error } = await client.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: 'https://offlinepdf.io/login.html',
      },
    });

    if (error) {
      btnMagic.disabled    = false;
      btnMagic.textContent = 'Send sign-in link';
      statusEl.className   = 'status-msg error';
      statusEl.textContent = 'Something went wrong. Please try again.';
      return;
    }

    // Show success state
    emailWrap.innerHTML = `
      <div class="magic-sent">
        <strong>✓ Check your inbox</strong><br>
        We sent a sign-in link to <strong>${email}</strong>. Click the link in the email to sign in — it expires in 1 hour.
      </div>`;

    // Save email for after redirect
    localStorage.setItem('opdf_pro_email', email);
  });

  // ── Google Sign In ─────────────────────────────────────────────────────
  btnGoogle.addEventListener('click', async () => {
    btnGoogle.classList.add('loading');
    btnGoogle.innerHTML = '<div class="spinner"></div> Connecting to Google…';
    statusEl.textContent = '';

    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: 'https://offlinepdf.io/login.html',
      },
    });

    if (error) {
      btnGoogle.classList.remove('loading');
      btnGoogle.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google`;
      statusEl.className = 'status-msg error';
      statusEl.textContent = 'Something went wrong. Please try again.';
    }
  });
</script>

</body>
</html>
